name: Trivy Scan for Pull Requests
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main, develop]
jobs:
  scanner-dependencies:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run vulnerable scanner lock file
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'fs'
        scan-ref: 'pnpm-lock.yaml'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'
        # Scan for vulnerabilities in language-specific package managers
        vuln-type: 'library'
        # Do not report on vulnerabilities that do not have a fix yet
        ignore-unfixed: true
        # Display results in a table format in the logs
        format: 'template'
        template: '@contrib/html.tpl'
        output: 'trivy-results.md'
        # output: 'trivy-results.sarif'
    - name: Upload scan result
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy-results.md

    - name: Read scan report
      id: trivy_report
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('trivy-results.md', 'utf8');
          const output = `### Trivy Vulnerability Scan Results\n\n${report}`;
          return output;
          
    - name: Create or update PR comment
      uses: peter-evans/create-or-update-comment@v3
      with:
        issue-number: ${{ github.event.pull_request.number }}
        # Key Change #4: Use the simplified output
        body: ${{ steps.trivy_report.outputs.result }}

